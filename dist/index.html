<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <meta name="description" content="Unkov: AI-native identity orchestration for the agentic enterprise." />
    <meta name="theme-color" content="#ffffff" />
    <title>Unkov — AI-Native Identity Governance</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <style>
      html, body { background: #faf9f7; color: #1d1d1f; margin: 0; padding: 0; }
      /* Loading indicator shown before React mounts */
      #pre-load {
        position: fixed; inset: 0; display: flex; align-items: center;
        justify-content: center; background: #faf9f7; z-index: 9999;
        font-family: system-ui, sans-serif; color: #6b7280; font-size: 0.875rem;
      }
      /* Error panel shown if JS crashes before React */
      #pre-error {
        display: none; position: fixed; inset: 0; background: #fff;
        padding: 2rem; font-family: system-ui, sans-serif; z-index: 99999;
        overflow: auto;
      }
    </style>
    <script type="module" crossorigin src="/assets/index-znADRxMU.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/vendor-ui-DBElx2xX.js">
    <link rel="modulepreload" crossorigin href="/assets/vendor-router-DytAvBGX.js">
    <link rel="modulepreload" crossorigin href="/assets/vendor-icons-DD3P_Iaz.js">
    <link rel="modulepreload" crossorigin href="/assets/vendor-charts-U0c7sk3x.js">
    <link rel="stylesheet" crossorigin href="/assets/index-C3pOBJmZ.css">
  </head>
  <body>
    <!-- Shows if React never mounts -->
    <div id="pre-load">Loading…</div>

    <!-- Shows if JS crashes before React ErrorBoundary -->
    <div id="pre-error">
      <h2 style="color:#b91c1c;margin:0 0 0.5rem">JavaScript error — page could not load</h2>
      <p style="color:#6b7280;margin:0 0 1rem;font-size:0.875rem">
        Open DevTools (F12 → Console) for details. Error:
      </p>
      <pre id="pre-error-msg" style="background:#1e293b;color:#f8fafc;padding:1rem;border-radius:6px;font-size:0.75rem;overflow:auto;white-space:pre-wrap;word-break:break-word;max-height:400px"></pre>
      <button onclick="location.reload()" style="margin-top:1rem;padding:0.5rem 1.25rem;background:#0061d4;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:0.875rem;font-weight:600">
        Reload
      </button>
    </div>

    <div id="root"></div>

    <script>
      // Catch any JS error before React loads
      window.addEventListener('error', function(e) {
        document.getElementById('pre-load').style.display = 'none';
        var errDiv = document.getElementById('pre-error');
        var errMsg = document.getElementById('pre-error-msg');
        errDiv.style.display = 'block';
        errMsg.textContent = (e.error ? e.error.stack : e.message) || String(e.message);
        console.error('[Unkov] Pre-React error:', e.error || e.message);
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('pre-load').style.display = 'none';
        var errDiv = document.getElementById('pre-error');
        var errMsg = document.getElementById('pre-error-msg');
        errDiv.style.display = 'block';
        errMsg.textContent = String(e.reason?.stack || e.reason || 'Unhandled promise rejection');
        console.error('[Unkov] Unhandled rejection:', e.reason);
      });

      // Force light mode
      document.documentElement.classList.remove('dark');
      document.documentElement.style.colorScheme = 'light';
      try { localStorage.removeItem('theme'); } catch(e) {}
    </script>

  </body>
</html>
